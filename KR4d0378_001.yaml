body:
  text: 雲泉詩宋薛嵎撰山中吟踈拙本天性束書歸舊林世人皆失笑泉石自知心山杮紅猶澀池魚靜亦沈于中觀物意吾道樂彌深題扶疎亭竹風晴雨雪天無趣不蕭然影過鄰家月根通石下泉長因終日看憶得故山眠物性今方㑹心虛節自然嵗暮書懐園林春又近老態更無歡添歳兒童喜照貧燈火寒直心嗟道喪多事識才難已種梅千樹從今爛漫看賦中上人頑坐取貫休覔句如頑坐句嗜吟忘夜凍立雪此同機工苦精靈聚毫端造化歸石牀趺半結荒徑葉頻飛客至應相訝無心聽扣扉賦陳子在瓢飲羨爾甘貧居陋巷遥知清德繼前修平時所樂從中得外物雖微不過求自枕曲肱安澹泊閒挑拄杖亦風流百千年内誰相望寂寞箕山一許由舟泊曹娥祠下身没一朝事孝名垂至今江空夜濤泣日落霧天隂社祭陳簫鼓蠻歌進寶琛予生無愧怍風浪不驚心旅中秋夜車馬日西東阮生徒自窮三年辭舊國今日又秋風邊雁凄凉過池花寂寞紅邦人慣相識漸覺語音通送劉荆山束書入京闕憂國最情深天意有興廢人才無古今布衣萬言疏孤劍一生心直道嗟難遇賈生終陸沈中秋家人玩月平生照離别今日喜團圞不是人心異全勝昨夜看八荒同皎潔列宿尚清寒自有銀河路乗槎到不難古淡師然公遊方野僧攜錫别何處度殘春天地無窮事江湖自在身真心齊得物道貌異于人昔日安禪地深山虎亦馴天育道中除將行巻外琴與鶴相隨問寺路猶逺入山僧未知鳥靈巢佛塔猿飲挂藤枝陵谷幾遷變道傍横古碑山中古松曽經雷斧劈上有鶻巢腥過客誰摽紙山精此托靈虬龍雲際頂龜鳥土中苓月夜境荒寂秋聲不可聽育王寺寺在衆山裏白雲深更深不知行樂意何似坐禪心䕶塔龍常在倚松僧獨吟渡江前賜字珍重到于今太白山觀雪二十里松聲千山雪未晴人當絶頂見吟到此時清大地球琳滿空林鳥雀驚老僧觀物化無滅亦無生天童山佛界似山居樓臺出翠微浙中山水最海内衲僧歸草樹有真意禽魚盡息機禪房無别事唯見白雲飛送潘道士春渚微茫碧草連千花飛盡柳飛綿孤雲野鶴生遥思明月清風共一船被褐還尋棲隠地空囊唯乞送行篇先生自有修真訣不倚丹砂駐少年過村翁家白髪茅茨下耰鋤力未衰兒孫收滯穗雞犬入寒籬俗朴人家善山深井税遲能言耆舊事相問坐移時薛野鶴瘦形如鶴頭如雪流浪江湖嵗月深但是胷中有丘壑何分城市與山林漁父一笠一蓑衣空江雨霏霏得魚雖假餌于世本無機晩唱教兒和閒身盡醉歸滄浪猶未足長羨白鷗飛開爐節賦閒身何所似丈室老維摩茅屋地爐小荒園麻葉多移窓就梅影曬草補漁蓑似此寧辭苦邊寒尚枕戈除夜苦雨華髪負滄洲星霜又一周未憑終夜雨能洗隔年愁池草起吟思樹禽栖屋頭空餘壯心在燈下看吳鈎呈楮溪主人一水傍通四五池竹亭茅榭亦相宜中間更著髙人住不到溪山無好詩寄公衮舍弟每恨世交薄相期情最深秋風一迴首明月兩闗心鶴病難為藥砂頑不化金予生百計拙耐可事清吟已亥大旱官催秋苗甚急立秋纔一日期㑹到林泉已悟征苗意曽吟喜雨篇饑鋤山草盡渴汲井泥堅聞道鄰州牧憂民夜不眠失題揮手紅塵吾老矣斷堤流水草堂新幾年荆棘無行路一日雲山有主人未許園丁知姓氏先從漁父問仁鄰謝池鷗鷺煙光裏飛去飛來伴隠淪山居簡氷友清溪槐逕三弟别後全無夢寄書安得頻誰憐獨往意天棄苦吟人債長新年息貧欺漸老身入林知未密猶與俗相親送友人之括蒼石門當半道想見泊舟時伴鶴立終日就岩題幾詩近山秋易老招隠地偏宜我亦江湖去心期爾得知為張上翁賦松之人梅竹操抱此嵗寒心古道久不作髙風獨在今無言欣意㑹肥遯愛山深我亦蕭閒者從君澗壑吟友人入京猿鶴亦悲鳴家山莫浪輕千峯帶秋色一路獨吟情野水衝潮白孤雲趂月行遥憐歸夢斷七十二灘聲秋試下第焦桐何處是知音獨向殘編惜寸隂此日便為終隠計青山已負十年心梅花獨對寒流潔野鳥髙飛古木深萬古紅塵徒擾擾幾人頭上有朝簪哭薛元善兄弟寂寞一窓燈隨風滅又明空堂連夜雨白髪哭兒聲樹色悲摇落交情隔死生唯應骨肉愛為鬼亦同行送松風僧淵中二公遊方無累雲相似悠悠天地間新秋生逺思此去未應還撼錫驚栖鶴聽松思故山吟詩與説法同是一機闗湖外别業四詠歸潔菴行藏自有意非命亦非時洗耳笑心褊折腰慙悟遲榮枯花上見寒暑鬢邊知獨立衡門下悠悠千古思漁村晩照舊時憶得瀟湘路今喜煙波似舊時澤畔怕逢漁父問桃源已被世人知數家草市添新戸一樹寒鴉傍古祠蘭杜香深洲渚濶小窓長日賦騷辭苜蓿軒取唐補闕苜蓿長闌干句好是春風長育天䦨干低䕶曉窓前園丁未必知吾事補闕清聲四百年蓑衣步水浸石根冷風吹藤葉飛菰蒲秋影裏長趂釣船歸寄送希仁兄弟咫尺不相見閉門唯苦吟聽殘寒夜雨灰盡壯年心身外一貧見燈前百慮深所欣交友義白首亦如今送僧自然過許峯知心逢豈易語别喜從容因得靜中趣又尋雲外峯吟篇題在竹拄杖曲如松後㑹難期定來書勿厭重題中川張氏所居鷗鳥往來處此翁甘隠淪地因人物著名入郡圖新夜月情懐淡茅茨意態真髙風無識抜老却採薇身松風閣地形連斗閣連雲松籟曽經佛祖聞永夜月明人到少海光山色自平分和雁來紅若將羣卉分髙下此種無因到畫䦨寒蝶不知紅是葉飛來猶作野花看劉荆山漁屋客星沈没釣臺空千載風流獨此翁萬頃波心搴杜若九霄雲外見㝠鴻已將名字編漁户只有琴書在室中楊栁煙深杖藜出滿頭衰白任春風歸雲壁上人遊方歸亦是無心出不如歸意閒一身隨杖錫十載住金山定石沾花雨清齋帶病顔常云迷覺路只在片言間友人以修煉遊方或傳其以此死者為賦是詩鶴骨難汚世上塵西風惆悵瘞湖雲莫悲生死今朝隔須信仙凡此路分丹竈空遺雞犬恨青山肯釣鹿麋羣蓬萊今古知何在秋草唯添處處吟李氏愛山樓境是吾心㑹于焉識所存鳥聲喧後寂樹色郭中村靜夀備仁理乾坤悟易門白雲同此意相對亦無言黄蜀葵嬌黄無力趂春暉待得秋風落葉飛空有丹心能就日年年憔悴對芳菲贈漁者幾度看山愧白鷗身名心事兩悠悠何如醉醒寒江上風捲蘆花雪滿頭真隠寺呈延上人塔光圓照室香炷讀經晨林下有清福塵中無悟人巖隂常候雨松色不知春青草何年墓標題界碣新茅屋茅舍竹椽短不勞朱堊施髙無神鬼瞰貧與子孫宜近古意全朴當風勢亦危梅花有幽致一樹隔疎籬胡賢良進史白首裒遺傳難甘閟一丘表成趣闕拜路左别家愁文字歸中祕科名異雜流當年韓吏部何日抱深憂秋夜宋希仁同吟松風閣有感相逢長日坐如癡瘦得吟肩聳過頥天意復生郊島在人心自逐古今移髙秋月色行松頂半夜山中讀楚辭此道若無千載後塵昏何處照妍媸寄羅浮天經居士羅浮峯對海壇峯只隔長江半里風君向西方了生死我于易象悟窮通數聲清梵空林下一幅漁罾落照中各各閉門無俯仰不相同處偶相同冬日雜言五首茅簷日出勝重裘飽飯看山倦即休識得箇中真象味自然無夢到封侯古藤荒草亂成堆自課園丁日日來只有梅花耐清苦霜風枝上犯寒開竹爐槁葉坐燒殘冷屋荒村夜更寒凍得形模龜樣縮誰知方寸似天寛鶴唳柴門月過墻梅花如雪滿林香風光直許閒人占不耐閒人夜亦忙布被烘來煖似湯䝉頭髙卧未昏黄道人不是貪鼾睡省事門中第一方雁山紀遊七首夀昌寺野服掛僧單禪扉月未闗桂香清近佛秋色老于山目盡遥峯出步回流水閒相傳登蕩路數處可躋攀能仁寺過盡盤山險登臨意忽平殿燈摇佛影瀑布雜鐘聲湫濶龍居頂路迴峯換名曉行林日薄海氣接雲生大龍湫深冬雷未蟄雨雹半空飛久立怪生眼迴看日變暉萬松聲不出尺蜃鬛猶威僧説分流濶長年無旱饑靈巖寺千年峻骨路隨怪各生形目力到天盡心旌倚佛寧夜鐘傳谷杳石氣逼燈青崖腹獼猴住多年性亦靈淨明寺入寺嫌僧俗獨行松逕幽夜扉崖室寂齋磬鐵衣秋谷棧雲迷級石橋霜迸流維摩不語坐何日病能瘳雲峯寺神功開地祕怪石盡為峯佛界虛空造龍居十二重睛瞳隨境役蟾兎及秋逢却憶謝靈運嶺頭迷去蹤寶冠靈雲二寺夜鐘寥閴逺相聞古物青山自結鄰片石挂空半可渡兩峯侵漢立如人雲歸蕩頂無多路僧住巖根老此身為憶龍湫重迴首來看瀑布獨逡巡劉荆山謁賈秋壑髩絲千縷去衝寒酒放詩豪强自寛天下英雄從古少人生遇合至今難婚姻債裏抛吟屋雨雪聲中起客單造物與君强健在歸囊知有暮年歡素上人圓鑑何須百鍊取晶瑩大化非由巧力成所性本來無闕蝕認形却恐未分明寒泉深夜轆轤靜素魄中天世界清到此萬緣皆了了笑他拂拭墮纒縈新春感懐五首新春風物舊山川老大情懐一惘然桃樹不知秦世換落花流水自年年兒女添年暗自欣不知婚嫁逼儂身羮藜衣褐由天分莫負當初種德人自悔中年廢讀書餘生祗可業樵漁青山白屋笑歸去從我髙眠百事疎新種黄精助晩糧生涯小小拙何妨春風吹髩不重緑白日笑人長自忙多置田園占好官妻兒奴婢盡生歡貧家有子才堪教身後窮愁且放寛送亷村宗人薛庭芝薛如晦還里老我儒冠誤憐君亦固窮山川居壤異友愛所天同江渡乗潮濶霜林逐曉空永懐楸壠敬淹泊志難通郭外隠居自是山林士非因失志餘兒童知稼穡猿鶴近詩書曙色浮滄海春風滿太虛固窮須學力不敢廢經鋤趙東閣倅越百指忍窮需逺次壯心銷盡髩絲知身如韋素居常泰官被聲名折得遲束擔喜聞千里戍出山唯有十年詩蘭亭風月應須記人物依稀似晉時秋日書懐萬事榮枯一聚塵塵中誰是獨醒人壯無學力吟將退老入賢闗路轉貧昨夜立秋凉到曉客齋對月靜如賔首陽千載蕨薇緑唯有夷齊紀逸民為歸雲師賦野航遇坎與乗流誰能拾迹求即空皆是境大渡本無舟風浪隨機息乾坤任泡浮可憐迷岸者漂蕩幾時休夜坐課子姪微風弄孤竹蛬響泣將晨欲辨男兒事當為志氣存簞瓢非外樂韋布只身貧慎勿忘科第務求榮爾親賦王九山滄浪閣千年孺子吟誰㑹此時心方寸有涇渭煙波無古今水禽知雨候山氣愛秋深不盡凭欄意橈歌歸故林省試舟中闕下春光近囊金又一空霜風欺敗絮星斗隔疎篷世道誰能挽妻孥見未同青燈對黄冊銷盡幾英雄旅店早起半醒夢猶在擁衾無限情曉窓燈影淡山路雪吟清嵗暮羨歸客囊空兼去程故書多廢理驚愧動心旌鮑靖之左藏一門期負荷太息此生終世道不如古君心誰與同官清餘槖在虞反故堂空作善寧須報悠悠付彼穹下第寸晷場中較尺尋榮親無路淚盈襟一貧誰過簞瓢巷百口難寛兒女心昨夢重圓知誤喜平生失計為工吟近來文體尤趨薄古道何由可語今為槐逕弟賦六愛無私天地情物我豈殊形此事闗方寸何人立户庭一琴調舜曲半壁寫西銘萬慮境常適誰能羨獨醒初夏過湖外别業郊原新緑喜新晴一曲湖光瀲灔明幾處樓臺空鎖鑰百年人物盡丘塋好花自分隨春去惡木寧思擇地生獨念索居聞識寡夜窓長對讀書檠趙東閣奏院去國帆近浙江風蓴鱸趣一同無人持國是舉世咎詩窮身退山林重心怡學問充㝠鴻離罾繳瞬息九霄空為迪上人賦寒猗山僧愛修竹種此出囂塵霜雪不知苦嵗寒長自春定回閒坐石風過動吟聲倘欲求歸止清虛即道真劉荆山過維揚再謁賈秋壑屝屨踐淮雪故人師帥歡燈前話疇昔時事又艱難陪宴平山曉尋梅古署寒却歸訪泉石珍重慰團圞山居述懐山瓢動瀑水一枕曲肱清未遇勤求日非沽隠逸名梅邊月在水寒夜酒如氷悟得乗除數貧中心自平本無師住甸陽山菴萬松圍坐石大海浴金輪不識入城路唯修成佛身出身來虎子持呪却山神何必工吟苦機鋒自絶塵冬蘭出林詎為晩知我嵗寒心不入離騷怨來親氷雪吟衆芳歸槁壤獨幹長窮隂為有幽人致相看情倍深閒居雜興十首亦有入城路門前秋草長荷鋤書在手負鍤醉為鄉雲渡溪流澁厨煙樹葉香為貧從儉約猶欠半年糧昔日黄金屋十年荆棘林浮生真亦假世事古猶今電隙無留景雲泉屬自心紛紛蝸角裏朝暮幾升沉鐵硯幾磨研依然螢雪邊薄才遺聖世無禄盡親年多病唯諳藥當寒不識綿素心期淡泊氷糵誓能堅秋蟲隨響滅振羽不知疲譬彼附炎士寧思失勢時垂竿動天氣定䇿茹商芝投分諒非淺翻然弗可追閉戸謝流俗青山獨自看淡交從古少冷面對人難農圃元非學神仙不在丹孤懐無别想回向此心觀四時俱槖籥一氣自迴旋誰謂春風力能專萬物權榮枯忘晦朔霜雪抱貞堅賦分有深淺殊非天道偏已是中年役何當絶悔尤漁樵非始志燈火企前修葉落秋容見巢傾鶴貌愁詩窮安敢避天為拙人謀土木非吾事支東復拄西雨盈溝壅葉簷側礎沉泥䕶壁時編葦登樓恐折梯若無憂撓至終嵗亦安棲近覺吟無趣權將俗累刪鶯花老眼倦風雨半春閒野服便粗褐柴扉掩暮山片雲尋處泊飛度竹簷間白髪天應棄春風吹不青神仙歸恍惚書傳出英靈周粟豈醫餓湘流難活醒迄今名字在百世仰芳馨潘懐古㕘學同吟四十過三四常恨詩銜欠一官人事中年多感慨仕途今日更艱難爐亭圍坐推前輩夜店單牀定薄寒最喜親庭佳闕近盡攜兒女入長安亷村族人命賦唐補闕薛公墓一自東宫吟苜蓿吁嗟直道竟難容精明夙佇危邦慮明哲寧髙避世蹤疎傅有心辭漢陛甘盤無夢佐髙宗寥寥千載聞風者引領猶能式墓松何處青山無白骨先生髙節死猶存古今人物一抔土閩浙詩書百世孫鄉邑有祠尊往哲樵芻知禁避荒垣斷碑殘碣堪摩拭慙愧年年宿草蕃潘南夫察院出臺鄉人榮其歸拉余迎訪因賦七言囊封朝上暮身擠讒口何如萬目齊昔謂椒蘭試擇地今知蕭艾適同畦波濤不動中流砥風雨難瘖晦旦雞自著漁蓑壓趨謁晨鍾欣出郭門西早起即事隔水鐘聲水上聞城中人事已紛紛開門放鶴溪邊去衝破閒堦一片雲電眸相士索詩築室漁村五六年湖光山色在吟邊道人不作閒人看浪説前人博酒錢林景雲㕘學一門四世同堂樂門外傳呼釋褐歸自此髙車訪遊舊屏將呼從叩漁扉三冬晴暖春寒在千里詩書野意違又説㩦琴捜逸譜休嫌古調按今徽王九山提刑于子城西舊宅累石作小阜見示五言因次韻奉呈幽懐隨所寓數石疊窓前荆棘倘迷道山林空浩然雲生寧擇地龍處即為淵誰謂達觀士終當違市㕓郭氏抗雲樓校讎存手澤肯構炯前光際此聖明代應無屋壁藏半窓分雪影羣蠧避芸香靜想趨庭意居然師友傍徐太古主清江簿四靈詩體變江西玉笥風清首入題舊隠乍違鷗鷺去新篇髙與簿書齊身閒自喜𤓰期逺俸薄還因紙價低握别正逢寒食日洞庭春緑草萋萋漁村㑹諸友戲呈磯頭濯足動滄浪獨醒何曽與世妨盡寫騷經粘屋壁未逢漁父似瀟湘逺山不離煙雲色流水時聞蘭杜香製得荷衣恐驚俗對人稱是楚賢裝再别徐太古主簿枌社過從久新知盡不如素心非必仕此别遂成疎清苦辭藜藿寒暄慎起居川途修復阻相憶眇愁予悼張寺丞五馬歸來絶送迎全將漚泡視浮榮宅依林麓樓臺小門有詩書氣味清身後只如僧冷淡墓頭曽是手經營夫人扶疾秋窓下深夜看經帶哭聲瓢飲陳子在病後見寄次韻奉答聞君卧病長於悒文㑹過從跡頓疎空對秋風驚節物無因杯酒具園蔬柴荆晝揜聽殘雨燈火凉生理故書一啟來緘拜佳什清泠如奉笑談餘棲褊絶句不學踰垣與閉門誅茅先卜逺人村釣魚磯在平如席坐對青山無一言重遊雁山分得六題雁蕩頂髙平餘十里湖湗落中間此地可耕鑿長年迷草菅一菴猶有路四望忽無山道者了經課慰余登陟艱龍鼻井怪極生真想饑凶禱請勤半身鱗甲具一勺渺瀰分應谷聲如鬼飛空石碍雲精誠隨寓在亦以感通聞天聰洞天聽本非耳形容獨費吟豈伊穿鑿力能探杳㝠心混沌開中竅空虛納衆音下臨千仞險當暑骨毛森水簾谷石壁斧修痕風泉斷續聞流漓光閃日空洞濕飛雲妙出神功造源從湫底分誰能為鈎起深處謁龍君照膽潭彼我俱澄澈中涵理趣深游鯈具龍體幽洞通潭心影動猿摇樹沙明日耀金片岩經霹靂痕鑿到于今五老峯巖前看不足化此石為身憶昔白頭者于中第幾人相看應失笑久立豈迷津勿厭薜蘿密癡兒免俗嗔哭瓢飲子在四首案頭螢火散惆悵夜吟魂路暗重泉迥堂空半影存命無藜藿富書獨鬼神尊猿鶴聲聲怨愁人不可言蟬蜕塵埃外閒身樂未涯山林天豈靳修短數難移冷硯誰濡墨空瓢想掛枝深衣古賢貌猶覬夢來時每恨去城逺畨畨語别難論交置疏數盡醉就團圞事往遽成感松彫不待寒尚餘親翰墨收涙再三看寢食難忘置心懐故友情花枝封蠟寄詩遞出門迎忍淚偏聽哭相期嗣子成乗除理終定人事未容輕月海逺上人遊方過靈隠一㸃靈光在月生滄海深此中難著語何處可相尋野寺齋無定窮冬日易隂聽松行九里却坐冷泉吟漁村雜咏十首莫論塵土與煙霞收拾襟懐即我家絮㡌䝉頭霜月下水村深夜看梅花非智非愚浪著鞭前程倒指事茫然臨流一洗巢由耳獨立斜陽認釣船盡醉茅柴得自由蘆花飛雪滿人頭蓑衣碎葉重重補聽雨吟風卒未休青山如主復如賔相對無言意自真富貴不應忘此味從來世上少閒人月下開門不用敲渡頭上繫木蘭橈盤飱市逺從真率㑹宿何妨屢卜宵澤畔行行歌楚騷一襟忠憤付湘濤難教舉世無醒者莫羨漁翁活計髙三五人家住一灣近城無路去來難溪邊自結同吟友松栢青青到嵗寒野水微茫路欲迷重重沙渚自髙低鷺鷥飛過無心泊直入殘陽樹杪棲猿鶴何曽肯受羈偶來亭畔立多時物情未到忘機地步步行行只自疑白雲相過尚依依十載江湖負宿知時事未容輕所學山中依舊只吟詩普覺院登上人房老梅擅名滋久昔四靈與其先師道公方公遊賦詠盈紙距今三世矣余每至其所輒徘徊不忍去登公亦對坐不倦有前輩之風逕弟拉同遊者賦詩因用其韻俾登藏之庶不愧昔日爾年年心與雪霜期一㸃寒生古樹枝昨夜故人相問訊隔窓無月坐移時四靈殁後誰知已惟有清香滿舊枝頭白山僧猶愛客為曽親見老師時感興簞瓢吾道在此樂語人難遺却形骸累始知天地寛逺山不辨樹髙屋易生寒數夜雪風急編蘆壁未完新年換桃符桃符頻換句難新休對春風訴舊貧近日兒童談道學幾時徴詔及閒人山田收薄官輸在樹雪吹殘曙色真慨想巢由老巖穴終身擊壤作堯民漁村雜詩十首再和前韻晴空萬里散餘霞一葉漁舟穏似家學道未能全寡欲水邊隙地亦栽花蘭菊分畦筍作鞭南山相對意悠然城中有路何曽入只許蒼頭趂釣船此身閒却有來由白髪中年已上頭莫道無官無可棄從今放下一齊休獨作漁樵最上賔土風淳朴物情真鮑家兄弟皆和樂林子詩豪膽壓人林鮑皆漁村鄰舍巡簷修竹晩風敲古寺僧歸月下橈童子閉門無一事只須清坐過中宵微吟朗詠只風騷切莫危言試怒濤雲本無心泉自潔不因作意立名髙生涯小小落溪灣妻子知時不説難畢竟直鈎為計拙晩來無酒可銷寒暝色和煙四望迷仰眠牛背覺天低村翁遥指笙歌處此地魚沉鳥不棲雉入樊籠馬受羈低頭猶怕欠趨時人心到此無真識未必人疑先自疑嵗寒無物可相依惟有梅花似故知名世何曽在科甲西湖處士只吟詩春晴泛湖平湖新漲緑沙觜淨涵波芳草思無際春風情最多移舟動山影止樂聽漁歌得意唯鴻鵠髙飛避網羅呈井南劉主簿何處井南居青山繞屋廬竹生從礙路泉響不驚魚有道貌亦古淡交情似疎慈親更彌壽堂上步徐徐春半春半數風雨水村増曉寒不辭蓑笠重自覺起居安隔霧山疑失占晴礎未乾可憐桃與李無語受摧殘太古元西堂過萬壽謁住山肇淮海禪師并簡老子舊知已江湖獨爾思北行逢作者送别苦為辭風雨過春半詩書滯海涯心心倘相印亦足慰衰遲憶汪氏山亭舊遊并簡因山為址屋無多中有幽人衣薜蘿自擷溪毛充野腹頻敲牛角和漁歌舟車相過情難數姓氏長留石可磨遥想對牀風雨際一燈終夜照吟哦古淡然老得帖往長蘆不受却歸松風舊寺次社中韻柱杖挑雲上半肩尋幽重到舊栖禪浮生多故成南北白髪相驚問嵗年房閉松聲難辨雨山連海脈暗通泉自從勇却長蘆請猿鶴終宵亦穏眠徐上人遊方雁鴻未去盡蕭索此時心杖錫投何寺風霜别故林眠時煨葉火朝谷應樵音往往長松下看山坐獨吟送宋顔氷過四明郡齋元戎招士重親臨喜遂傳書萬里心乍免客愁供帳具暫停遊事㦸門深秋空矯首瞻魁彩夜燭憑花聽雁音從此文名滄海濶好風三日到雞林憶昔曽登太白巅閒雲留我石牀眠集詩刪失題猶記人事乖違嵗屢遷極羨故交遊汗漫不禁離思對嬋娟山中逺致兼金餽形迹相忘二十年松風隆首座住雲際禪院山門開望海鐘鼓動魚龍人具慈悲相秋生寂寞容隨身唯一鉢留偈别雙松後夜橋西月支笻失所從入京逢故人長貧復羇旅共爽十年歡在世誰無累如君事獨難僦居鄰火後多病卧春殘縱决歸山計煙蘿不療寒下第歸故園扁舟摇蕩水心村幾度煙波入夢魂猿鶴認名聽號令漁樵執禮叙寒温浮生多事景逾促自古求人道不尊莫為窮途效曠達定應束帛賁丘園山中依然木石居造物任乗除時事今休問山中計不疎泉聲増雨後禽語變春初吟得詩名世終身甘荷鋤山居十首深澗游羣魚髙樹鳴幽禽山中白日長同此逍遥心脱粳香可炊濁酒聊自斟過茲非所求孰為升與沉隂壑生暮寒白雲如炊煙麋鹿不識人時復近我前青松三四株石牀在其邊意思清且閒可以終餘年名利能移人智者為之愚厯觀古英雄鮮或全其軀幸逃世網牽園綺真吾徒勿令千載下歎惜斯人無前村雨脚收斜陽挂髙樹老翁牽牛歸頗亦有幽趣山風響茅屋崖月導芒屨平生江湖心于此謝馳騖龍居洞雲深飛泉瀉石壁不聞耳邊諠但覺心境寂富貴由他人得失俱抱戚孰能全其天山中樗與櫟午睡不覺長童子入城迴地爐散微煙煨芋已成灰獨酌無佳賔梅花為我開須臾山月髙顧影空徘徊木落山轉空景駛寒亦早百草無愠容低頭就枯槁形生復形化安用置懐抱千古淵跖分所論非壽夭古調今誰彈至樂非外假淵明愛無弦此意知者寡放鶴未歸來時倚長松下旁觀彼何人笑我衣裳野老妻倦縫紉癡兒厭藜藿一貧誰復言多累吾已錯山半雲可耕山下泉可鑿軒冕亦倘來豈得長如昨柴門長日闗不碍溪水流桃花樹難尋悵望迴輕舟雖無武陵源事與昔人侔已矣勿復言白頭安五丘亷村薛庭芝訴貧于余余亦貧不能周之贈以是詩兩窮相值愁無計同是開元補闕孫百世清風于此在莫將貧悴對人言素上人遊方山深不可見一錫又雲飛梵譯通方語林霜㸃衲衣神閒生境寂思苦入吟微寒月空相照何人夜叩扉送蓑衣與陳子淵漫成口號莎草為衣葉葉新已知難上貴官身野人相贈無他意從使心清迹更清自君之出矣三首自君之出矣淚對花枝灑風窓挑夜燈心在無由瀉自君之出矣荏苒度寒燠譬彼雙鯉魚書辭長在腹自君之出矣抱此離恨情春蠶不作絲纒綿過一生越僧一書記索賦二絶松風閣何處笙簫起半空滿山秋日動蛟龍老僧無語憑欄久遊盡白雲千萬重月泉月色泉聲境自真有身終不惹埃塵山中受用祗如此住者知為淡泊人為鄭菊山賦斗室居然真樂地跬步亦徜徉大器何曽局修程未易量中天應躔象吾道即宫墻萬斛泉源在非徒志秕糠松阜弟于寶成寺祖墓之側營剏别業為賦得閒亭詩取又得浮生半日閒之句陟巘心已清復此風雨蔽髙人疏鑿餘理道頗超詣卜築諧素志緇侣欣共濟修竹尚無恙巢鶴亦數世空山嵐欲滴近水石可憩春睡朝旭升夜語孤燭繼髙扁出林麓先壠祀苗裔嚴鐘警晨昏羣岫羅扈衞身同野鹿遊跡許巢父嫓蝸角自為雄蟻磨卒致斃靡懐半日羨詎識終老計吾廬並漁村興往輒鼓枻野衣裁芰荷敗屋粘薜荔川陸阻㑹面嵗月迅流逝茲情不可忘淡交慎勿替及時畢婚嫁即事無芥蔕相從丘壑真永使心迹契泉石聞斯言庶以當盟誓林氏梅巖古意元從淡泊來雲根香雪㸃磯苔靜觀造化春長在不是氷霜凍得開半影落池涵潔白一峯無路接塵埃逋仙家世君端的只恐清吟未易陪項大著輓詩恥為恩門屈寧辭御史遷力陳歸老疏自盡讀書年祕府神遊地浮榮夢覺前世間真不死未必屬蒼天劉荆山歸自維揚營漁屋退居謾道歸來晩閒中日最長漁翁尊齒序客子效戎裝野水涵秋霽風荷動夕陽十年畢婚嫁亦勝為人忙定菴逺山主修持功行滿不墮刼中塵龍象西天邃松杉卵塔新臘髙同輩盡斂薄小師貧生滅理無二交深獨愴神哭槐逕弟孤僻由天性看山獨展眉豈無身後慮猶課病中詩泉石寧非祟蒼旻不可知平生唯愛菊増我九秋悲王九山挽詩三首古史無完傳清風獨可模從誰問出處舉世在泥塗氣直于時忤身榮與道俱士林為重惜揮淚奠生芻修行過衲子蔬飯幾昏晨自草休官疏猶嫌在世身片雲先塚近寒月萬松鄰為鬼還應别平生有善因俗論鄙迂儒公明獨受欺焦琴方入調夜鵲忽驚枝心事將誰許身名負已知九原如可作白首誓為期逢舊友生交遊半零落身在復長貧對語寒燈盡相看白髪新兵興無樂土市近少閒人遥憶桃源路鳥啼花自春和清溪可居壁間韻松風相對掩重闗何止浮生半日閒此是仙家真境界蓬萊猶在有無間日日虛廊步百迴吟邊時有可人來西湖處士詩名世老向孤山亦為梅林景雲令祖夫妻隨其子各居同日葬真誥巖前舊築居夫妻雙化是仙期至今耕隴桑麻地全是桃源晉宋時窀穸同晨符卜吉親朋分夜别靈帷詩書孫子名方盛錦誥重恩日未遲康氏端齋於焉能取友人已兩無偏立行有如此前修應比肩吟情近風雅胷次著林泉愧我全迂癖交遊又十年陳子淵台州添倅髙志愛官閒來從玉筍班離家買湖石開印對巾山風月添新句朋遊記舊顔桃花元有約猥賤未能扳潘氏梅所種梅營數椽四壁但蕭然清帶山林氣香來筆研邊雪深天向晩人立鶴趨前余亦嵗寒者相從恰暮年近買山范灣自營藏地與亡弟草塘君及外家墓塋悉可跂望感事述情繼有是作十首因縁還是范灣邊自卜牛眠轉自憐千古青山逢具眼歎莖秋鬢近衰年倒騎黄犢尋來路貪看行龍下逺田慙愧鄰翁為指説傳聞此地産英賢外家事後凄凉甚老婦思親哭最哀今日青山留我在他年寒食望甥來極知造物成吾志可但精靈慰夜臺惆悵昔時原上路獨餘宿草見春回草堂相望隔重雲愧我為兄早哭君少日對吟聽夜雨老來無計撫孤墳泉臺㝠漠唯増感人事安排已十分莫待他年推吉應如今友愛最先聞敢慕昔賢居曠達分甘吟骨寄山阿劉伶常備隨身鍤陶令曽為自挽歌未必浮生于此悟算來忙處為人多北邙原上堪回首莫枉心情用太過十萬買山渾可住放教身死骨猶香不知筋力何年盡看到杉松幾尺長管郭豈能謀富貴詩書元自著興亡采薇歌在無人識千載清風獨首陽分明來日已無幾還似㕘禪未透時吟骨縱清難免死黄精多啖亦充饑題詩遣得山精去近俗偏將古墓夷合眼便為泉下鬼此身康濟莫宜遲大有公卿弗似吾一枝藤上挂葫蘆旋疏苔石通崖溜自祝山神保鶴雛休羨銘旌題極品試將槐樹植三株依然此事憑隂德從古幽明理不殊贏得青山終老看閒身受用不須多風霜落木時將暮功業無心鏡嬾磨道士共聯石鼎句村童能和草菴歌葢棺一事安排了肯信光隂去似梭山中百事且休聞也莫㕘禪莫鍊神纒樹古藤無了日隨風亂葉豈由身閒來景物吟方到靜處工夫識始真想得大槐宫裏夢日髙猶有未醒人依然且作住菴看茒屋三間辦不難戸外莫容千駟馬客牀唯置兩蒲團深林藏虎風長怒短木支門睡自安西北干戈猶未已偶逢樂土自衰殘髙新甫雲崖步步危機死不知白雲深處最平夷猿啼鶴唳非無意纔近髙人便入詩悼薛君載衣被惟綀褐長閒未覺貧將何折君壽不盡百年身竹樹多于屋禽魚近得人生無世情戀寧復怨蒼旻石蒼逋上人南遊并謁劉後村所師郊與島知己又應難羽檄邊風急風霜嵗事殘出家忘路逺渡海識天寛文暢浮屠者當時亦慕韓君成弟清溪孺子歌猶在滄浪可濯纓流來如玉潔止處似心平魚避飛鳬影荷添落雨聲詩書源更逺千古嫓交情哭中師雪崖衆裏知心少唯師是故人臨終書未答昨夜夢全真鶴唳渾如哭花開不似春近逢同住者得問病元因霽雪亭千樹玉成林逺香清可尋幾疑安道在直得老逋吟逈與春風異唯宜盡日隂塵中無此景羨爾棄華簮方氏墓廬扁曰白雲飛處諸峯互隠蔽一望一増悲觸目易成感思親無盡時松扉隂似雨翁仲立如癡出岫亦何意悠然自不知漁村偶題莫道柴門窄斷無車馬聲苦吟成集少久病見人生花落寒猶在春隂雨未成漁村名自我鷗鷺勿相輕唐補闕清風亭去國遺忠藎朝盤托諷深因知潔已意亦是愛君心貌像意全古子孫貧至今清風如可繼塊土已埋沈寄珂雪屋積雪覆茅屋僧居清更清浮生千刼盡長日一燈明野鳥呼能下山靈避不行舊時江月住時聽誦經聲賦山雲姪偶鋤取山谷晴時偶自耕句扶犂人所賤何苦事耕耘生意未終息雨聲曽厭聞詩書長在手畚鍤豈勞君祗恐青雲上能將此志分還甘泉沈氏詩巻之人吾畏友相望水東西筆下山林趣詩中五十題讀書長閉户自奉只羮藜名字他年出雙松應共齊萬象亭年年此地駐吟鞍十萬人家指掌寛天上星辰依舊逺山中松桂不知寒月生滄海一輪靜雲泊䦨干片影殘見説亭基從古在擬將圖志試尋看朱氏雲壑舒巻悠悠付太空居然丘壑共胷中人生知己終難必世上無心自不同片石若浮龍在水逺峯欲露樹吟風羨君隠處有如此想見詩成字字工本無師與槐逕弟交遊二十年矣古人謂百篇詩盡和一盞酒須分余于二公亦云槐逕既亡本無編其往來之詩號曰雲林酬唱僭述鄙句奉呈中年為此别悲動故交情案上雲林巻山中風木聲夢回驚復喜詩在死如生幾度西郊路逢師獨自行宣氏梅邊自入孤山詠梅花最識詩喜逢吟苦友共此嵗寒期曙色雪初霽暗香春未知前村風景别祗是愛茅茨耕樂躬耕樂道真吾事三聘看來未是榮時尚可為君更悟何妨藜藿度殘生王民山惠詩民山名字出朋輩獨推先不間寒暄問于今四十年傳來詩似錦倐去步如仙自古山林士無營貌亦賢漁村即事維舟古渡頭四望是汀洲水濶唯宜夏荷枯不礙秋困歸牛背穏曉汲井雲浮獨坐愁無侣多畨為月留潘氏可軒可人居此地稱此可軒名力學倘無倦終身集大成言辭寓深淺權度要分明休認工夫到何妨緩作程青藜閣為林景雲賦九斗峯前太乙臨星辰亦鑒此時心樓髙不礙光芒入坐久忽驚風露深千古聖賢書裏見吾身學問性中尋夜窓勤苦追先哲名字何分昔與今追憶永嘉前政知縣趙大猷時景定改元興言民父恩猶在何故年來盡不如清節苦于為士日歸裝輕似到官初月明來往尋思遍燈下懐人音問疎矯首天朝除日到放教田里得安居髙氏石雲取賈島移石動雲根句閬仙曽得句月下自推敲以此幽閒趣長為淡泊交水寒梅照影霜滑鳥歸巢余亦同懐者從君結把茅清醒獨懐忠憤赴湘中舉國昏昏志不同漁父笑君君亦笑煙波相望各西東囊螢山中不羨青藜貴清夢何曽到石渠裁得練囊連夜喜兒童也學裹衣裾殘星數㸃照科斗此事分明屬後生記得年時頭未雪夜窓不覺又三更謝松岡姪惠詩韋布名猶盛詩書不負人每過臨水宅長想釣魚身思苦詩難和嵗寒交始真迺翁憐病久余病復兼貧邵氏悦心堂擾擾利名役鬢髭霜雪侵要知充此性即是悦吾心有道境常裕無營味最深紛華安肯羨出入更酣沈别鶴見説瀛洲萬里程相思猶覬下青㝠已歸天上神仙籍不就人間飲啄腥昨夜月明如失友故園籠在且休扃隣家亦有雛堪待丹頂微微振薄翎冬日野步樹上有禽啼似春聲髙聲下亦何心幽人拄杖移時立句句詩中是苦吟山中梅花詩人魂在梅花上不比垂楊管别離野鶴聲聲聲漸逺定應飛報月明知已有梅花未得詩青山相對動愁眉山翁只在山中住花落花開總不知山中長日山中坐白雲應笑人浮生塵未脱至老趣難真身在影猶贅年豐家自貧莫將吟事費栁色已知人漁父詞七首蘭芷流來水自香滿汀鷗鷺動斜陽聲欸乃間鳴榔儂家只合岸西旁翁嫗齊眉婦亦賢小姑顔貌正笄年頭髪亂髻鬟偏愛把花枝立柂前湘妃涙染竹痕斑風雨連朝下釣難春浪急石帆寒買得茅柴味亦酸滿湖飛雪攪長空急起呼兒上短蓬蓑笠具畫圖同鐵篴聲長曲未終離騷讀罷怨聲聲曽向江邊問屈平醒還醉醉還醒笑指滄浪可濯纓白髪髼鬆不記年扁舟泊在荻花邊天上月水中天夜夜煙波得意眠只有青山可卜隣妻兒笑語意全真休識字莫嫌貧方是安閒第一人漁村逺望滿山殘雪滿溪雲惟有沙鷗獨見親往事不堪頻入夢吟篇無數更愁人扁舟欲渡誰人載破衲䝉頭近六旬尚擬來生因可結凄凉何處問蒼旻閒居言懐老子從來不為名放教心地到和平庭前草色知春近窓外梅花終夜明紙帳夢回移月影石溪流斷失灘聲吟邊莫問紅塵事只住茅茨亦自清柴門春風隨處好吟事又相催觸石雲飛去呼童鶴誤來杖藜無疾步花地有香埃不許車塵入柴門只半開獨宿山中二首澗水松風聲不斷白雲飛上屋頭栖山中昨夜孤吟客只把無眠便作題誅茅無地結菴遲借得人家近翠微何事樹禽驚不起也應知我久忘機漁家生涯漁業在屋漏漸増茅莫道直鈎拙翻同稚子敲夜燈然竹火賔坐具山肴中有白頭者離騷手自鈔題山中井泉井口依山缺更無沙礫渾相傳海眼出久視石碑存定按星辰位不多穿鑿痕早年人盡汲汲盡復源源鄭氏時齋取學而時習句力學競分隂俄驚嵗月深豈為科舉地自遂讀書心名教有餘樂塵埃不可尋肯同碌碌者白首尚贏金松岡過許峯送葬此行吟更苦哭舊萬山深處士花猶昔何人詩在今奉親無旅况對佛動慈心霜夜増寒思半牀安紙衾輓陳運管安人孫氏舅家如母在痛哭淚沾襟平日經聲斷茲晨佛力深墓廬猶手搆梱則是夫箴山上半慈竹從知契夙心君譽病愈相訪有誰憐我老賢弟獨知心月夜空相憶梅花都未吟愁因失鶴致貧為買山深連日勤過訪新篘得共斟還寓樂姪詩巻吾詩吟未了今爾亦工吟筆下心思苦書中理趣深青燈宜逺到白日易西沉多謝憐衰疾連朝獨見臨園中莫道趨時拙書中樂未涯荷鋤依樹歇聯句笑人遲仙去井猶在年荒草不衰近來筋力減累失看花期賈鹿巖不是長江派因何亦好吟從知世味淡自覺野情深科舉無名字案頭唯古今新銘為讀盡可惜老山林山中遇雨草荒泥磴滑老病厭扶持雨逐雲先後路隨山險夷天寒禽自浴屋漏榻頻移吟事愁無緒梅花意亦悲山居有感無忮復無求山林終自由雪飛猶有積雲住欲相留朋友疏因數功名喜亦憂休休亭記在此是死前休湖外泛雪雨雪連朝意未休支笻難步最髙樓梅花不識春風面野水相平古渡頭船上看山無屋礙塵中閲世似漚浮一生窮苦縁詩癖莫把詩窮認作愁病中感興風霜嵗又除藜杖步徐徐兒輩憂無樂牀頭喜有書背因曝日煖交為訴貧疎天定由人事不如深閉廬憶嵇師奥觀梅并貴行弟殁後之思不到嵇師今幾春凄凉匹馬去無因同遊人葬梅花下應笑花開不見人守歳五首兒輩呼盧不計錢地爐圍坐笑聲喧老夫自算吟邊事栽竹移花近百篇明日焚香叩九闗六旬修未到清閒莫憐身在閒中老雪後騎驢亦看山鶴雛添嵗頂微紅想見瀛洲路亦通昨夜柴門長半掩三更敲盡呌歸籠新嵗才餘七日糧燈前猶自笑人忙茅簷霜下寒衣薄爇盡蒹葭夜更長平日過從乏貴遊更來湖上棹扁舟除將兒女行行拜鄰舍相逢坐即休山雲惠二物梅枝贈我江南一朶春獨清滋味自相親只愁月下推敲拙難與梅花作主人畫竹跬步園中種亦難渭川還有幾千竿山雲遺我氷綃軸得與梅花相對看漁村有感小窓長日苦吟聲獨倚䦨干看晩晴居士莫疑貧可棄春風不為病相親梅邊紙帳重重影壁上離騷字字清鷗鷺往來情更熟只消此地度殘生雲泉詩
