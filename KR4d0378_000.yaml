body:
  text: 雲泉詩别集類三宋提要臣等謹案雲泉詩一卷宋薛嵎撰嵎字仲止一字賔日永嘉人寶祐四年進士官長溪簿宋承五代之後其詩數變一變而西崑再變而元祐三變而江西江西一派由北宋以逮南宋其行最久久而弊生於是永嘉一派以晚唐體矯之而永嘉四靈出焉然四靈名為晚唐其所宗實止姚合一家所謂武功體者是也其法以新切為宗而寫景細瑣邊幅太狹遂為宋末江湖之濫觴葉適以鄉曲之故初力推之久而亦覺其偏始稍異論焉嵎之所作皆出入四靈之間不免局於門户然尚永嘉之初派非永嘉之末派録而存之亦足備一格也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:56c6dcebb0a05a574d40007c92c48b194df11583e01a43336e4f2d9e65f2532c
